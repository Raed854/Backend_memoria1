# ===============================
# APPLICATION
# ===============================
spring.application.name=MemorIA-backend
server.port=8082

# ===============================
# H2 DATABASE CONFIGURATION (Development)
# ===============================
spring.datasource.url=jdbc:h2:mem:memoria_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===============================
# OPTIONAL
# ===============================
spring.jpa.open-in-view=false

# ===============================
# EUREKA CLIENT (Disabled for local dev)
# ===============================
eureka.client.enabled=false

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:9090

# ===============================
# EMAIL (configure with your SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=Jasserchouat3@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=jasserchouat3@gmail.com
