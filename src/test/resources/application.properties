# ===============================
# TEST CONFIGURATION
# Uses in-memory H2 instead of MySQL and disables external integrations
# (Eureka, mail server) so the Spring context can load offline.
# ===============================
spring.application.name=MemorIA-backend-test
server.port=0

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:memoria_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# Disable Eureka client during tests
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
spring.cloud.discovery.enabled=false

# CORS
app.cors.allowed-origins=http://localhost:3000

# Mail (no real SMTP needed for tests; auto-config still requires the property)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=test
app.mail.from=test@test.com

# Default admin bootstrap
app.admin.email=admin@memoria.com
app.admin.password=Admin@123

# AI service URL
ai.service.url=http://localhost:5000
